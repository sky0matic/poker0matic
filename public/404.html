<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      // Redirect to the SPA root, encoding the original path so index.html can restore it.
      var base = window.location.pathname.split('/').slice(0, 2).join('/') // e.g. /poker0matic
      var rest = window.location.pathname.slice(base.length) + window.location.search + window.location.hash
      window.location.replace(window.location.origin + base + '/?p=' + encodeURIComponent(rest))
    </script>
  </head>
  <body></body>
</html>
